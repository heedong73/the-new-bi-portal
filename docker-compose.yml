networks:
  bip-net:
    driver: bridge

volumes:
  reportimage_data:

services:
  redis:
    image: redis:7-alpine
    container_name: bip-redis
    networks:
      - bip-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bip-backend
    networks:
      - bip-net
    env_file:
      - .env
    volumes:
      - reportimage_data:/data/reportimage
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bip-worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    networks:
      - bip-net
    env_file:
      - .env
    volumes:
      - reportimage_data:/data/reportimage
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bip-scheduler
    command: celery -A app.workers.celery_app beat --loglevel=info
    networks:
      - bip-net
    env_file:
      - .env
    depends_on:
      worker:
        condition: service_started
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: bip-nginx
    networks:
      - bip-net
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
