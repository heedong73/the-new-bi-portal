# ============================================================
# BIP(The New BI Portal) — nginx 리버스 프록시 (엣지)
# ------------------------------------------------------------
# 역할 (design "배포 및 환경 변수 설계" / Docker Compose 컴포넌트 구성):
#   - 내부망 전용 "유일한 외부 진입점" (단독 노출되는 컨테이너는 nginx 뿐)
#   - /          → frontend 정적 서빙 컨테이너로 프록시 (SPA)
#   - /api/*     → backend(FastAPI :8000) 로 프록시
#   - /reportimage/*  → 정적 서빙은 권한 검증을 우회하므로 기본 비활성(off).
#                       기본 이미지 접근 경로는 (a) 메일 inline CID 첨부,
#                       (b) GET /api/report-images/{id} 권한 검증 다운로드 API.
#   - TLS 종단(443) 자리 포함 — 사내 인증서 배치 후 활성화.
#
# 충족: R25.6(리버스 프록시 단일 진입점), R31.3(이미지 접근 권한 검증)
#
# 주의: 본 파일은 dedicated `nginx` 서비스(nginx:alpine)가 사용하는
#       server 블록이며 /etc/nginx/conf.d/default.conf 로 마운트된다.
#       서비스 결선(volume/포트/env)은 docker-compose 정의(task 1.1)에서 처리한다.
# ============================================================

# 업스트림 — compose 내부 서비스명 기준
upstream bip_backend {
    server backend:8000;
    keepalive 32;
}

upstream bip_frontend {
    # frontend 컨테이너는 자체 nginx 로 정적 빌드 산출물을 :80 에 서빙한다
    # (frontend/nginx.conf, SPA fallback 포함). 단독 노출하지 않는다.
    server frontend:80;
    keepalive 16;
}

# ------------------------------------------------------------
# HTTP (:80)
#  - 내부망 전용. TLS 활성화 시 아래 80 블록은 443 으로 리다이렉트하도록
#    전환할 수 있다(맨 아래 HTTPS 블록 주석 참조).
# ------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # 내부망 전용 운영을 가정. 프록시 본문 크기는 PBIX Import 업로드
    # (POST /api/reports/{id}/pbix, multipart)를 고려해 넉넉히 설정한다.
    client_max_body_size 200m;

    # gzip 압축
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 공통 보안 헤더 (내부망이지만 기본 방어선)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;

    # --------------------------------------------------------
    # /api/* → backend(FastAPI :8000)
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://bip_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Export/Refresh 등 장기 호출은 Worker 위임으로 즉시 202 응답되지만,
        # 동기 조회 여유를 위해 타임아웃을 다소 넉넉히 둔다.
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # --------------------------------------------------------
    # /reportimage/* — 정적 서빙(권한 우회). 기본 비활성.
    # --------------------------------------------------------
    # design 결정: 저장 이미지의 nginx 정적 서빙은 BIP 권한 검증을 우회하므로
    # 기본 OFF(SERVE_REPORTIMAGE_STATIC=false) 이다. 기본 접근 경로는
    #   - 메일: Worker 가 이미지 바이트를 multipart/related + Content-ID(cid:) inline 첨부
    #   - 포털/관리자: GET /api/report-images/{id} 권한 검증 다운로드 API(스트리밍)
    #
    # 내부망 편의가 반드시 필요할 때만(SERVE_REPORTIMAGE_STATIC=true) 운영자가
    # 아래 블록의 주석을 해제하고 STORAGE_ROOT_PATH 를 이 컨테이너에 마운트한다.
    # 켜는 순간 인증 우회 위험이 발생함을 반드시 인지/문서화할 것.
    #
    # location /reportimage/ {
    #     alias /data/reportimage/;   # STORAGE_ROOT_PATH 마운트 경로
    #     autoindex off;
    #     # 내부망 한정 접근 통제 예시(필요 시):
    #     # allow 10.0.0.0/8;
    #     # deny  all;
    #     try_files $uri =404;
    # }

    # --------------------------------------------------------
    # / → frontend (React SPA 정적)
    # --------------------------------------------------------
    location / {
        proxy_pass http://bip_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

