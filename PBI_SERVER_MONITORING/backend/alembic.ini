# ============================================================
# Alembic configuration - Power BI Refresh Monitor (Backend)
# ------------------------------------------------------------
# - script_location points at the in-package migrations directory so the
#   env.py can import the `app` package (models -> Base.metadata).
# - prepend_sys_path = . makes /app (the backend working dir, where this file
#   lives) importable, so `import app...` works during migrations.
# - sqlalchemy.url is intentionally a placeholder; the real URL is injected at
#   runtime from Settings.DATABASE_URL inside env.py (asyncpg driver).
#   NEVER hard-code real credentials here.
# ============================================================
[alembic]
script_location = app/migrations
prepend_sys_path = .

# Overridden in env.py via settings.DATABASE_URL (postgresql+asyncpg://...).
sqlalchemy.url = driver://user:pass@localhost/dbname

# Use a path-separator that works cross-platform for version locations.
version_path_separator = os

[post_write_hooks]

# ------------------------------------------------------------
# Logging configuration
# ------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
