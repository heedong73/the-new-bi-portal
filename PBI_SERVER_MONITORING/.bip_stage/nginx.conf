# =============================================================================
# The New BI Portal (BIP) v1.0 — nginx 리버스 프록시 설정
# -----------------------------------------------------------------------------
# 역할(설계 "배포 및 환경 변수 설계", "보안 설계 표" 기준):
#   - 유일한 외부 진입점, 내부망 전용
#   - `/`          → frontend 정적 빌드 서빙 (SPA, index.html fallback)
#   - `/api/*`     → backend(FastAPI :8000) 리버스 프록시 (프록시 헤더 포함)
#   - `/reportimage/*` 정적 서빙은 **기본 비활성**(SERVE_REPORTIMAGE_STATIC=false 의미).
#                  권한 검증을 우회하므로 기본 off. 켜는 방법은 아래 주석 참고.
#                  기본 이미지 접근 경로: (a) 메일=CID inline 첨부,
#                  (b) 포털/관리자=권한 검증 다운로드 API `GET /api/report-images/{id}`.
#   - TLS 종단은 자리만 마련(주석). v1.0는 내부망 http로 동작.
#
# 컨테이너 빌드 참고(docker-compose의 frontend build 단계에서 사용):
#   - 이 파일은 frontend 이미지 빌드 시 `/etc/nginx/conf.d/default.conf`로 복사하거나
#     nginx 서비스에 마운트한다. (예: COPY frontend/nginx.conf /etc/nginx/conf.d/default.conf)
#   - 정적 빌드 산출물은 `/usr/share/nginx/html`에 위치한다고 가정한다.
#   - upstream 호스트명(backend)은 compose 서비스명과 일치해야 한다.
# =============================================================================

# gzip 압축 — 정적 자산/JSON 응답 전송량 절감
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;
gzip_min_length   1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

# backend(FastAPI) upstream — compose 서비스명 `backend`, 포트 8000
upstream bip_backend {
    server backend:8000;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# (선택) TLS 종단 — v1.0는 내부망 http. 운영 TLS 필요 시 아래 블록을 활성화.
#   - 인증서 위치(예): /etc/nginx/certs/bip.crt , 개인키: /etc/nginx/certs/bip.key
#   - compose에서 certs 볼륨을 마운트하고, 80 → 443 리다이렉트를 추가한다.
#
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;   # http → https 강제
# }
# server {
#     listen 443 ssl;
#     http2 on;
#     server_name bip.intra.example;
#     ssl_certificate     /etc/nginx/certs/bip.crt;   # <CERT_PATH>
#     ssl_certificate_key /etc/nginx/certs/bip.key;   # <CERT_KEY_PATH>
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     # ... 이하 location 블록은 아래 http server와 동일하게 둔다 ...
# }
# -----------------------------------------------------------------------------

server {
    listen      80;
    server_name _;

    # PBIX 업로드(POST /api/reports/{id}/pbix)를 고려한 본문 최대 크기.
    # 설계의 업로드 검증과 일관되게 200m로 설정(필요 시 .env/compose에서 조정).
    client_max_body_size 200m;

    # 프록시/업로드 타임아웃 — PBIX 업로드, Export 트리거 등 다소 긴 요청 대비
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # 정적 빌드 산출물 루트(frontend)
    root  /usr/share/nginx/html;
    index index.html;

    # 보안 헤더(내부망 기본값) — 필요 시 확장
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # -------------------------------------------------------------------------
    # /api/* → backend(FastAPI) 리버스 프록시
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://bip_backend;

        # 프록시 헤더 — 원 클라이언트 정보 보존(인증/감사/로그용)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # 표준 HTTP/1.1 프록시(keepalive upstream 사용)
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 백엔드가 자체 버퍼링/스트리밍을 제어할 수 있도록
        proxy_buffering off;
    }

    # -------------------------------------------------------------------------
    # /reportimage/* 정적 서빙 — 기본 비활성 (SERVE_REPORTIMAGE_STATIC=false)
    # -------------------------------------------------------------------------
    # 권한 검증을 우회하므로 기본적으로 끈다. 기본 접근 경로는
    #   - 메일: Worker가 이미지 바이트를 multipart/related + Content-ID(cid:)로 inline 첨부
    #   - 포털/관리자: GET /api/report-images/{id} 권한 검증 다운로드 API
    #
    # 내부망 편의로 정적 서빙을 켜려면(권장하지 않음, 인증 우회 위험):
    #   1) StorageService 저장 루트(STORAGE_ROOT_PATH, 예: /data/reportimage)를
    #      nginx 컨테이너에 읽기 전용으로 마운트한다.
    #   2) 아래 location 블록의 주석을 해제한다.
    #
    # location /reportimage/ {
    #     alias /data/reportimage/;   # = STORAGE_ROOT_PATH (read-only 마운트)
    #     autoindex off;
    #     # 내부망 한정 접근 통제 예시:
    #     # allow 10.0.0.0/8;
    #     # deny  all;
    # }
    #
    # 기본(off): /reportimage/* 요청은 404로 차단한다.
    location /reportimage/ {
        return 404;
    }

    # -------------------------------------------------------------------------
    # / → frontend 정적 서빙 + SPA fallback
    # -------------------------------------------------------------------------
    # 해시 처리된 정적 자산은 장기 캐시
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 그 외 모든 경로는 SPA 라우팅을 위해 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }
}
