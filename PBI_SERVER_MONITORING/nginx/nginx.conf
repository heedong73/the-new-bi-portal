# ============================================================
# BIP (The New BI Portal) - nginx 리버스 프록시 설정
# ------------------------------------------------------------
# 역할 (design.md Architecture §2 / 배포·환경변수 설계):
#   - 내부망 전용 단일 진입점 (TLS 종단은 사내 인프라에서 처리)
#   - `/`          → Frontend 정적 빌드 산출물 서빙 (SPA fallback)
#   - `/api/*`     → Backend(FastAPI :8000) 리버스 프록시
#   - `/reportimage/*` → 저장 이미지 정적 서빙 (기본 비활성, 아래 주석 블록 참고)
#
# 서비스명(backend)·포트(8000)는 docker-compose(task 1.1)의 bip 네트워크
# 내부 서비스명을 기준으로 한다.
#
# 보안 경계 (design 결정 #4 / R38):
#   - 이 컨테이너는 어떤 secret(Power BI/Azure/SMTP/DB)에도 접근하지 않는다.
#   - Frontend 정적 빌드에는 secret 이 포함되지 않는다.
#
# 검증: nginx -t (문법 검사)
# ============================================================

server {
    listen 80;
    server_name _;

    # Frontend 정적 빌드 산출물 (frontend 빌드 결과를 이 경로로 제공)
    root /usr/share/nginx/html;
    index index.html;

    # 업로드 한도: PBIX Import API 업로드(/api/reports/{id}/pbix)는
    # 대용량일 수 있으므로 /api/ 프록시에 넉넉한 본문 크기를 허용한다(R12.6).
    # (전역 기본값; /api/ location 에서 필요 시 재정의)
    client_max_body_size 200m;

    # gzip 압축
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Docker 임베디드 DNS (compose 네트워크). 아래 $backend 변수와 함께 사용하면
    # nginx 기동 시점이 아닌 요청 시점에 backend 호스트를 해석하므로, backend 가
    # 늦게 떠도 nginx 가 크래시-루프하지 않는다.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ----------------------------------------------------------
    # /api/* → Backend(FastAPI :8000) 프록시
    # ----------------------------------------------------------
    location /api/ {
        # 변수 사용 시 location 기반 URI 재작성이 일어나지 않으므로 원본 URI
        # (/api/...) 가 그대로 backend 로 전달된다 — FastAPI 라우트가 /api/ 하위에
        # 마운트되므로 의도한 동작이다.
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 장기 작업 트리거(Export/Refresh/메일/PBIX Import enqueue) 응답 대기 여유
        proxy_connect_timeout 30s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # 업로드(PBIX 등) 본문 크기 허용
        client_max_body_size 200m;
    }

    # ----------------------------------------------------------
    # 정적 자산 캐시
    # ----------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----------------------------------------------------------
    # SPA fallback: 존재하지 않는 경로는 index.html 로
    # (React Router 클라이언트 라우팅 지원)
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================================
    # [기본 비활성] /reportimage/* 정적 서빙 (SERVE_REPORTIMAGE_STATIC=false)
    # ----------------------------------------------------------
    # ⚠ 보안 경고: 이 블록은 BIP 의 권한 검증(인증/레포트 열람권)을 *우회*하여
    #    저장 이미지를 정적 파일로 직접 노출한다. 저장 이미지 접근의 기본 경로는
    #      (a) 메일 = 본문 inline(CID) 첨부
    #      (b) 포털/관리자 = GET /api/report-images/{id} 권한 검증 다운로드 API
    #    이므로 이 정적 서빙은 *기본 비활성*(SERVE_REPORTIMAGE_STATIC=false)이며,
    #    완전한 내부망에서 편의가 필요할 때에 한해 운영자가 의도적으로 켠다.
    #    (design 배포 설계 / R31.3, R38.1)
    #
    # 활성화 방법:
    #   1) SERVE_REPORTIMAGE_STATIC=true 로 운영하기로 결정했을 때만,
    #   2) 아래 블록의 주석을 해제하고,
    #   3) StorageService 의 STORAGE_ROOT_PATH(기본 /data/reportimage) 를
    #      이 컨테이너에 동일 경로로 마운트(read-only 권장)한다.
    #
    # location /reportimage/ {
    #     alias /data/reportimage/;          # = STORAGE_ROOT_PATH (read-only 마운트 권장)
    #     try_files $uri =404;
    #     expires 1h;
    #     add_header Cache-Control "private";
    #     # 내부망 외 접근 차단을 위해 필요 시 IP allow/deny 를 추가한다.
    # }
    # ==========================================================
}
