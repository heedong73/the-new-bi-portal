# ============================================================
# nginx 설정 - SPA 정적 서빙 + fallback
# ------------------------------------------------------------
# - 정적 파일을 서빙하고, 존재하지 않는 경로는 index.html 로 fallback
#   (React Router 클라이언트 라우팅 지원)
# - /api 프록시는 선택 사항이며 후속 task(7)에서 다룰 수 있다.
#   현재는 정적 서빙 + SPA fallback 위주로 구성한다.
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 압축
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 정적 자산 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: 존재하지 않는 경로는 index.html 로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # (선택) Backend API 프록시 - 후속 task에서 활성화 가능
    # location /api/ {
    #     proxy_pass http://backend:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
